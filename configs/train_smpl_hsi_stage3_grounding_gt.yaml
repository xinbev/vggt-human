experiment:
  name: hsi_stage3_grounding_gt
  output_dir: outputs/train/hsi_stage3_grounding_gt
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: Training
  train_sequence_manifest: ""
  val_sequence_manifest: ""
  contact_teacher_root: ""
  require_contact_teacher: true
  train_contact_only: true
  val_contact_only: true
  sequence_length: 3
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  num_workers: 12
  pin_memory: true
  subset_indices_csv: ""
  subset_index_column: dataset_index
  subset_repeat: 1
  subset_apply_to_val: false

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: false
  enable_hsi_human_scene_align: false
  enable_hsi_translation_refine_v4: false
  enable_hsi_contact_refine: false
  enable_hsi_grounding: true
  smpl_provider: gt_perturbed
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_aggregator_forward: true
  train_hsi_grounding_only: true
  freeze_hsi_grounding: false
  predict_boxes: false
  predict_id_embed: false
  smpl_query_box_prior: true
  smpl_track_assignment_mode: gt
  smpl_use_external_track_prior: false
  hsi_geometry_mode: gt_metric
  hsi_grounding_hidden_dim: 192
  hsi_grounding_sole_vertices_per_foot: 48
  hsi_grounding_exclusion_vertices: 256
  hsi_grounding_support_window: 21
  hsi_grounding_support_min_points: 24
  hsi_grounding_support_max_rmse_m: 0.05
  hsi_grounding_support_max_depth_m: 20.0
  hsi_grounding_support_max_point_depth_delta_m: 0.75
  hsi_grounding_target_clearance_m: 0.005
  hsi_grounding_max_root_delta_m: 0.12
  hsi_grounding_gate_threshold: 0.5
  hsi_grounding_hard_gate_eval: true
  hsi_grounding_overwrite_refined: true
  hsi_grounding_min_depth_confidence: 0.0

checkpoint:
  load_vggt_baseline: true
  strict: false
  resume: ""
  resume_strict: false
  resume_optimizer: false
  resume_required_prefixes:
    - hsi_grounding_head.
  reset_epoch: true
  save_scope: hsi
  save_prefixes:
    - hsi_grounding_head.
  save_optimizer: false
  save_epoch_checkpoint: false
  save_latest: true
  save_final: false
  save_top_k: 3
  save_top_k_from_train: false
  topk_create_stable_copies: true
  monitor: metric_hsi_grounding_selection
  monitor_mode: min

optim:
  batch_size: 12
  epochs: 3
  lr: 0.00001
  weight_decay: 0.01
  grad_clip_norm: 1.0
  log_interval: 20
  log_style: progress
  val_log_style: compact
  progress_bar_width: 28
  progress_max_loss_items: 12
  progress_log_keys:
    - loss_total
    - loss_hsi_grounding_gate
    - metric_hsi_grounding_valid_coverage
    - metric_hsi_grounding_apply_target_rate
    - metric_hsi_grounding_gate_accuracy
    - metric_hsi_grounding_base_l2_p95_m
    - metric_hsi_grounding_candidate_l2_p95_m
    - metric_hsi_grounding_refined_l2_p95_m
    - metric_hsi_grounding_improvement_rate
    - metric_hsi_grounding_clean_displacement_p95_m
  val_log_keys:
    - loss_total
    - loss_hsi_grounding_gate
    - metric_hsi_grounding_valid_coverage
    - metric_hsi_grounding_gate_accuracy
    - metric_hsi_grounding_base_l2_p95_m
    - metric_hsi_grounding_candidate_l2_p95_m
    - metric_hsi_grounding_refined_l2_p95_m
    - metric_hsi_grounding_improvement_rate
    - metric_hsi_grounding_float_p95_m
    - metric_hsi_grounding_penetration_p95_m
    - metric_hsi_grounding_clean_displacement_p95_m
    - metric_hsi_grounding_selection
  val_interval: 1
  allowed_trainable_prefixes:
    - hsi_grounding_head.
  required_trainable_prefixes:
    - hsi_grounding_head.
  required_gradient_prefixes:
    - hsi_grounding_head.

training_prior:
  center_noise: 0.0
  size_noise: 0.0
  drop_prob: 0.0
  smpl_perturb_mode: contact_root
  smpl_contact_noise_clean_prob: 0.20
  smpl_contact_float_levels_m: 0.02,0.05,0.08,0.12
  smpl_contact_penetration_levels_m: 0.01,0.02,0.04,0.06
  smpl_gt_override_prob: 0.0

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  conf_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  use_vggt_camera_projection: true
  projection_camera_source: gt
  hsi_pose_weight: 0.0
  hsi_betas_weight: 0.0
  hsi_transl_cam_weight: 8.0
  hsi_joints3d_weight: 2.0
  hsi_vertices_weight: 1.0
  hsi_projected_joints2d_weight: 0.0
  hsi_delta_reg_weight: 0.0
  hsi_no_worse_weight: 8.0
  hsi_no_worse_margin_m: 0.002
  hsi_transl_clean_identity_weight: 4.0
  hsi_grounding_gate_weight: 2.0
  hsi_grounding_gate_margin_m: 0.002
  hsi_grounding_target_clearance_m: 0.005
  hsi_grounding_active_threshold_m: 0.02
  hsi_contact_refine_plane_weight: 0.0
  hsi_contact_refine_pose_weight: 0.0
  hsi_contact_refine_class_weight: 0.0
  hsi_contact_refine_no_worse_weight: 0.0
  hsi_contact_refine_swing_no_pull_weight: 0.0
  id_weight: 0.0

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
