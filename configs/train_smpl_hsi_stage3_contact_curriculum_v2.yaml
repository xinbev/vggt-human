experiment:
  name: hsi_stage3_contact_curriculum_v2
  output_dir: outputs/train/hsi_scale_trans_contact_v2/stage3a1_root_contact
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: Training
  sequence_length: 3
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  require_contact_teacher: true
  train_contact_only: true
  val_contact_only: true
  num_workers: 12
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  enable_hsi_human_scene_align: true
  enable_hsi_contact_refine: true
  smpl_provider: gt_perturbed
  nlf_use_detector: false
  nlf_require_boxes: true
  nlf_model_name: smpl
  nlf_internal_batch_size: 192
  nlf_num_aug: 1
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_aggregator_forward: true
  freeze_hsi_scene_affine: true
  freeze_hsi_backbone: true
  freeze_hsi_human_scene_align: true
  train_hsi_human_scene_align_only: false
  train_hsi_contact_refine_only: true
  freeze_hsi_contact_pose_branch: true
  freeze_hsi_contact_root_branch: false
  predict_boxes: false
  predict_id_embed: false
  smpl_query_box_prior: true
  smpl_track_assignment_mode: gt
  smpl_use_external_track_prior: false
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_probe_mode: local_nearest
  hsi_affine_probe_mode: local_nearest
  hsi_probe_window: 9
  hsi_scene_affine_mode: clip_median
  hsi_enable_temporal_momentum: false
  hsi_align_base_source: pred
  hsi_align_num_sample_vertices: 128
  hsi_align_local_window: 7
  hsi_align_max_ray_delta_m: 3.0
  hsi_align_max_tangent_delta_m: 0.12
  hsi_align_max_depth_m: 20.0
  hsi_align_max_correspondence_distance_m: 0.75
  hsi_align_gt_max_correspondence_distance_m: 3.5
  hsi_align_overwrite_refined: true
  hsi_contact_hidden_dim: 256
  hsi_contact_sole_vertices_per_foot: 48
  hsi_contact_support_window: 21
  hsi_contact_support_min_points: 24
  hsi_contact_support_max_rmse_m: 0.05
  hsi_contact_support_max_depth_m: 20.0
  hsi_contact_max_root_normal_delta_m: 0.12
  hsi_contact_max_hip_delta_deg: 4.0
  hsi_contact_max_knee_delta_deg: 8.0
  hsi_contact_max_ankle_delta_deg: 10.0
  hsi_contact_overwrite_refined: true
  hsi_geometry_mode: gt_metric

checkpoint:
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false
  reset_epoch: true
  save_scope: hsi
  save_prefixes:
    - hsi_refinement_head.
    - hsi_human_scene_align_head.
    - hsi_contact_refine_head.
  save_optimizer: false
  save_epoch_checkpoint: false
  save_latest: true
  save_final: false
  save_top_k: 3
  save_top_k_from_train: false
  topk_create_stable_copies: true
  monitor: metric_stage3_selection
  monitor_mode: min

optim:
  batch_size: 16
  epochs: 2
  lr: 0.00001
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 20
  log_style: progress
  progress_bar_width: 28
  progress_max_loss_items: 12
  progress_log_keys: loss_total,metric_stage3_selection,loss_hsi_contact_refine_plane,loss_hsi_contact_refine_swing_no_pull,metric_hsi_contact_float_p95_m,metric_hsi_contact_penetration_p95_m,metric_hsi_contact_false_pull_rate,metric_hsi_contact_contact_gate_mean,metric_hsi_contact_swing_gate_mean,metric_hsi_transl_l1_delta,metric_hsi_joint_error_delta
  val_interval: 1

training_prior:
  center_noise: 0.0
  size_noise: 0.0
  drop_prob: 0.0
  smpl_perturb_mode: contact_root
  smpl_contact_noise_clean_prob: 0.20
  smpl_contact_float_levels_m: 0.02,0.05,0.08,0.12
  smpl_contact_penetration_levels_m: 0.01,0.02,0.04,0.06
  smpl_gt_override_prob: 0.0

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  conf_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  use_vggt_camera_projection: true
  projection_camera_source: gt
  hsi_pose_weight: 0.0
  hsi_betas_weight: 0.0
  hsi_transl_cam_weight: 4.0
  hsi_ray_delta_weight: 0.0
  hsi_tangent_delta_weight: 0.0
  hsi_joints3d_weight: 2.0
  hsi_vertices_weight: 0.5
  hsi_projected_joints2d_weight: 0.0
  hsi_align_point_weight: 0.0
  hsi_align_delta_reg_weight: 0.0
  hsi_align_no_worse_weight: 0.0
  hsi_delta_reg_weight: 0.05
  hsi_no_worse_weight: 8.0
  hsi_no_worse_margin_m: 0.002
  hsi_contact_refine_plane_weight: 6.0
  hsi_contact_refine_pose_weight: 0.0
  hsi_contact_refine_class_weight: 0.2
  hsi_contact_refine_no_worse_weight: 8.0
  hsi_contact_refine_swing_no_pull_weight: 5.0
  hsi_depth_teacher_weight: 0.0
  hsi_smpl_scale_teacher_weight: 0.0
  hsi_contact_weight: 0.0
  hsi_foot_contact_weight: 0.0
  hsi_foot_sole_contact_weight: 0.0
  hsi_support_plane_contact_weight: 0.0
  id_weight: 0.0

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
