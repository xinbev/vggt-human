experiment:
  name: smpl_hsi_nlf_provider_stage1
  output_dir: outputs/train/smpl_hsi_nlf_provider_stage1
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: ""
  sequence_length: 2
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  smpl_provider: nlf
  nlf_use_detector: false
  nlf_require_boxes: true
  nlf_model_name: smpl
  nlf_internal_batch_size: 64
  nlf_num_aug: 1
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_aggregator_forward: true
  train_smpl_query_token: false
  train_smpl_box_prior_embed: false
  train_smpl_patch_pool_embed: false
  predict_boxes: false
  predict_id_embed: false
  smpl_return_aux: false
  smpl_query_box_prior: true
  smpl_query_patch_pool: false
  hsi_num_tokens: 24
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_use_gt_depth_teacher: true
  id_embed_dim: 256

checkpoint:
  resume: ""
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false

optim:
  batch_size: 1
  epochs: 80
  lr: 0.000005
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 20
  log_style: progress
  progress_bar_width: 28
  progress_max_loss_items: 8
  progress_log_keys:
    - loss_total
    - loss_hsi_depth_teacher
    - loss_hsi_anchor_depth
    - loss_hsi_transl_cam
    - loss_hsi_joints3d
    - loss_hsi_projected_joints2d
    - metric_hsi_joint_error_delta
    - metric_hsi_depth_teacher_l1
  save_interval: 1
  val_interval: 1

training_prior:
  center_noise: 0.00
  size_noise: 0.00
  drop_prob: 0.00

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  conf_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  projected_bbox_source: joints
  use_vggt_camera_projection: true
  hsi_pose_weight: 6.0
  hsi_betas_weight: 0.8
  hsi_transl_cam_weight: 3.0
  hsi_joints3d_weight: 16.0
  hsi_projected_joints2d_weight: 0.35
  hsi_depth_teacher_weight: 0.20
  hsi_anchor_depth_weight: 0.10
  hsi_contact_weight: 0.05
  hsi_contact_threshold: 0.08
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
