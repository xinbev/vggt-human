experiment:
  name: smpl_hsi_after_translation_ray_refine
  output_dir: outputs/train/smpl_hsi_after_translation_ray_refine
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: ""
  sequence_length: 2
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_aggregator_forward: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_smpl_head: true
  train_smpl_translation_heads: false
  train_smpl_translation_refiner: false
  train_smpl_query_token: false
  train_smpl_box_prior_embed: false
  train_smpl_patch_pool_embed: false
  predict_boxes: true
  smpl_bbox_mode: reference_residual
  predict_id_embed: false
  smpl_return_aux: true
  smpl_query_box_prior: true
  smpl_query_patch_pool: true
  smpl_query_patch_pool_expand: 0.12
  smpl_enable_translation_refine: true
  smpl_translation_refine_hidden_dim: 512
  smpl_translation_refine_max_ray_delta_m: 1.20
  smpl_translation_refine_max_tangent_delta_m: 0.60
  smpl_translation_refine_max_log_depth_delta: 0.85
  smpl_translation_refine_max_box_prior_weight: 1.00
  smpl_translation_refine_human_height_prior_m: 1.70
  smpl_translation_refine_use_log_depth: true
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_probe_mode: projected
  hsi_affine_probe_mode: projected
  hsi_probe_window: 9
  hsi_probe_blend: 1.0
  hsi_use_delta_gate: true
  hsi_enable_temporal_momentum: false
  hsi_scene_affine_mode: clip_median
  hsi_scene_affine_ema_alpha: 0.25
  id_embed_dim: 256

checkpoint:
  resume: outputs/train/smpl_translation_ray_refine_full_from0121/merged_hsi_translation/checkpoint_latest.pt
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false
  save_final: true
  save_epoch_checkpoint: false
  save_latest: true

optim:
  batch_size: 1
  epochs: 150
  lr: 0.000003
  weight_decay: 0.05
  grad_clip_norm: 0.25
  log_interval: 20
  save_interval: 0
  val_interval: 1
  log_style: progress
  progress_log_keys:
    - loss_total
    - loss_hsi_transl_cam
    - loss_hsi_joints3d
    - loss_hsi_vertices
    - loss_hsi_depth_teacher
    - loss_hsi_anchor_depth
    - metric_hsi_joint_error_delta
    - metric_hsi_scene_log_scale_delta
    - metric_hsi_scene_bias_delta

training_prior:
  center_noise: 0.04
  size_noise: 0.10
  drop_prob: 0.03

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  transl_refine_delta_reg_weight: 0.0
  transl_refine_ray_depth_weight: 0.0
  transl_refine_tangent_weight: 0.0
  conf_weight: 0.0
  conf_loss_type: focal
  conf_focal_alpha: 0.25
  conf_focal_gamma: 2.0
  conf_target_type: matched_iou
  conf_iou_min: 0.3
  conf_iou_power: 1.0
  duplicate_conf_weight: 0.0
  duplicate_iou_threshold: 0.5
  aux_weight: 0.0
  aux_conf_weight: 0.0
  aux_bbox_weight: 0.0
  aux_giou_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  projected_bbox_source: joints
  use_vggt_camera_projection: true
  hsi_pose_weight: 2.0
  hsi_betas_weight: 0.4
  hsi_transl_cam_weight: 2.0
  hsi_joints3d_weight: 12.0
  hsi_vertices_weight: 4.0
  hsi_projected_joints2d_weight: 0.20
  hsi_depth_teacher_weight: 0.10
  hsi_depth_teacher_max_m: 30.0
  hsi_depth_teacher_error_clip_m: 1.5
  hsi_depth_teacher_use_human_roi: true
  hsi_depth_teacher_roi_expand: 0.75
  hsi_depth_teacher_min_valid_pixels: 2048
  hsi_anchor_depth_weight: 0.05
  hsi_anchor_scene_xyz_weight: 0.0
  hsi_delta_reg_weight: 0.50
  hsi_no_worse_weight: 1.0
  hsi_no_worse_margin_m: 0.02
  hsi_gate_reg_weight: 0.01
  hsi_contact_weight: 0.0
  hsi_foot_contact_weight: 0.0
  hsi_foot_sole_contact_weight: 0.0
  hsi_support_plane_contact_weight: 0.0
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
