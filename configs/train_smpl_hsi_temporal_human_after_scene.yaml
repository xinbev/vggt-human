experiment:
  name: smpl_hsi_temporal_human_after_scene
  output_dir: outputs/train/smpl_hsi_temporal_two_stage/stage2_human_temporal
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: ""
  sequence_length: 4
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_aggregator_forward: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_smpl_head: true
  freeze_hsi_backbone: true
  freeze_hsi_scene_affine: true
  train_hsi_transl_only: true
  train_smpl_query_token: false
  train_smpl_box_prior_embed: false
  train_smpl_patch_pool_embed: false
  predict_boxes: true
  smpl_bbox_mode: reference_residual
  predict_id_embed: false
  smpl_return_aux: true
  smpl_query_box_prior: true
  smpl_query_patch_pool: true
  smpl_query_patch_pool_expand: 0.12
  hsi_num_tokens: 24
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_probe_mode: projected
  hsi_affine_probe_mode: projected
  hsi_probe_window: 9
  hsi_probe_blend: 1.0
  hsi_use_delta_gate: true
  hsi_use_gt_depth_teacher: true
  id_embed_dim: 256

teacher:
  enabled: true
  checkpoint: outputs/train/smpl_hsi_temporal_two_stage/stage1_scene_affine/checkpoint_latest.pt
  strict: false
  load_vggt_baseline: false
  model_overrides:
    hsi_probe_mode: projected
    hsi_affine_probe_mode: projected
    hsi_probe_blend: 1.0
    hsi_use_delta_gate: true

checkpoint:
  resume: outputs/train/smpl_hsi_temporal_two_stage/stage1_scene_affine/checkpoint_latest.pt
  load_vggt_baseline: false
  strict: false
  resume_strict: false
  resume_optimizer: false

optim:
  batch_size: 1
  epochs: 125
  lr: 0.0000002
  weight_decay: 0.0
  grad_clip_norm: 0.10
  log_interval: 20
  save_interval: 1
  val_interval: 1

training_prior:
  center_noise: 0.0
  size_noise: 0.0
  drop_prob: 0.0

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  conf_weight: 0.0
  conf_loss_type: focal
  conf_focal_alpha: 0.25
  conf_focal_gamma: 2.0
  conf_target_type: matched_iou
  conf_iou_min: 0.3
  conf_iou_power: 1.0
  duplicate_conf_weight: 0.0
  duplicate_iou_threshold: 0.5
  aux_weight: 0.0
  aux_conf_weight: 0.0
  aux_bbox_weight: 0.0
  aux_giou_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  projected_bbox_source: joints
  use_vggt_camera_projection: true
  hsi_pose_weight: 0.0
  hsi_betas_weight: 0.0
  hsi_transl_cam_weight: 1.5
  hsi_joints3d_weight: 4.0
  hsi_vertices_weight: 2.0
  hsi_projected_joints2d_weight: 0.01
  hsi_depth_teacher_weight: 0.0
  hsi_anchor_depth_weight: 0.0
  hsi_anchor_scene_xyz_weight: 0.0
  hsi_anchor_scene_window: 11
  hsi_delta_reg_weight: 1.0
  hsi_no_worse_weight: 25.0
  hsi_no_worse_margin_m: 0.005
  hsi_gate_reg_weight: 0.05
  hsi_foot_contact_weight: 0.0
  hsi_foot_sole_contact_weight: 0.0
  hsi_support_plane_contact_weight: 0.0
  hsi_teacher_pose_weight: 0.0
  hsi_teacher_betas_weight: 0.0
  hsi_teacher_transl_weight: 4.0
  hsi_teacher_joints_weight: 6.0
  hsi_teacher_vertices_weight: 4.0
  hsi_teacher_scene_affine_weight: 1.0
  hsi_pose_velocity_weight: 0.0
  hsi_betas_velocity_weight: 0.0
  hsi_transl_velocity_weight: 1.0
  hsi_joints_velocity_weight: 2.0
  hsi_joints_acceleration_weight: 1.0
  hsi_scene_scale_temporal_weight: 0.0
  hsi_scene_scale_sequence_weight: 0.0
  hsi_scene_bias_temporal_weight: 0.0
  hsi_scene_bias_sequence_weight: 0.0
  hsi_contact_weight: 0.0
  hsi_contact_threshold: 0.08
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
