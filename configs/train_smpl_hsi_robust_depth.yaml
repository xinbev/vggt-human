experiment:
  name: smpl_hsi_refine_20q_robust_depth_from0121
  output_dir: outputs/train/smpl_hsi_refine_20q_robust_depth_from0121
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: ""
  sequence_length: 2
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_aggregator_forward: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_smpl_head: true
  freeze_hsi_backbone: true
  freeze_hsi_scene_affine: false
  train_hsi_scene_affine_only: true
  train_smpl_query_token: false
  train_smpl_box_prior_embed: false
  train_smpl_patch_pool_embed: false
  predict_boxes: true
  smpl_bbox_mode: reference_residual
  predict_id_embed: false
  smpl_return_aux: true
  smpl_query_box_prior: true
  smpl_query_patch_pool: true
  smpl_query_patch_pool_expand: 0.12
  hsi_num_tokens: 24
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_use_gt_depth_teacher: true
  id_embed_dim: 256

checkpoint:
  resume: outputs/train/smpl_hsi_refine_20q/checkpoint_epoch_0121.pt
  load_vggt_baseline: false
  strict: false
  resume_strict: false
  resume_optimizer: false

optim:
  batch_size: 1
  epochs: 124
  lr: 0.000001
  weight_decay: 0.0
  grad_clip_norm: 0.25
  log_interval: 10
  save_interval: 1
  val_interval: 1

training_prior:
  center_noise: 0.00
  size_noise: 0.00
  drop_prob: 0.00

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  conf_weight: 0.0
  conf_loss_type: focal
  conf_focal_alpha: 0.25
  conf_focal_gamma: 2.0
  conf_target_type: matched_iou
  conf_iou_min: 0.3
  conf_iou_power: 1.0
  duplicate_conf_weight: 0.0
  duplicate_iou_threshold: 0.5
  aux_weight: 0.0
  aux_conf_weight: 0.0
  aux_bbox_weight: 0.0
  aux_giou_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  projected_bbox_source: joints
  use_vggt_camera_projection: true
  hsi_pose_weight: 0.0
  hsi_betas_weight: 0.0
  hsi_transl_cam_weight: 0.0
  hsi_joints3d_weight: 0.0
  hsi_projected_joints2d_weight: 0.0
  hsi_depth_teacher_weight: 1.0
  hsi_depth_teacher_max_m: 30.0
  hsi_depth_teacher_error_clip_m: 2.0
  hsi_depth_teacher_use_human_roi: true
  hsi_depth_teacher_roi_expand: 0.75
  hsi_depth_teacher_min_valid_pixels: 2048
  hsi_anchor_depth_weight: 0.0
  hsi_anchor_scene_xyz_weight: 0.0
  hsi_anchor_scene_window: 5
  hsi_delta_reg_weight: 0.0
  hsi_contact_weight: 0.0
  hsi_contact_threshold: 0.08
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
