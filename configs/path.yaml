checkpoints:
  # Required if configs/train_smpl.yaml checkpoint.load_vggt_baseline=true.
  # Expected: VGGT-Omega/VGGT baseline state_dict or checkpoint containing model/state_dict/model_state_dict.
  vggt_baseline: "/home/zhw/lab_users/xyb/home/projects/vggt-human/checkpoints/vggt_omega_1b_512.pt"
  yolo8x: "/home/zhw/lab_users/xyb/home/projects/vggt-human/checkpoints/yolov8x.torchscript"

  # Optional future use; current training script does not require this checkpoint.
  sat_hmr_smpl: "/home/zhw/xyb_space/SAT-HMR/weights/sat_hmr/sat_644.pth"

assets:
  # Optional future use for SMPL mesh/joint decoding; current minimal training does not instantiate smplx.
  smpl_model_dir: "/home/zhw/lab_users/xyb/home/projects/vggt-human/checkpoints/body_models/smpl"
  smpl_mean_params: "/home/zhw/lab_users/xyb/home/projects/vggt-human/checkpoints/body_models/smpl/smpl/smpl_mean_params.npz"

datasets:
  # Required by configs/train_smpl.yaml data.root_key=datasets.bedlam_root.
  # Expected layout:
  #   <bedlam_root>/Training/<sequence>/rgb/frame_*.png
  #   <bedlam_root>/Training/<sequence>/smpl/frame_*.pkl
  #   <bedlam_root>/Training/<sequence>/depth/frame_*.npy   optional
  #   <bedlam_root>/Training/<sequence>/cam/frame_*.npz     optional
  #   <bedlam_root>/Test/...                                optional validation split
  bedlam_root: "/home/zhw/xyb_space/bedlam/processed_bedlam/"

  # Project-local sidecar annotations generated by scripts/preprocess/prepare_bedlam_boxes.py.
  # This directory stores bbox metadata only and does not mutate or copy the BEDLAM tree.
  bedlam_boxes_root: "outputs/preprocess/bedlam_boxes"
  
third_party:
  # Video person observation frontend. Keep third-party paths project-relative
  # because the same checkout may be named vggt-human or vggt-omega on server.
  boosttrack_root: "third_party/BoostTrack"
  boosttrack_weights_root: "third_party/weights/BoostTrack"
  sam2_root: "third_party/sam2"
  sam2_checkpoint: "third_party/weights/sam/sam2.1_hiera_large.pt"
