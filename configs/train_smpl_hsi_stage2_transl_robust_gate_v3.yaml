experiment:
  name: hsi_stage2_transl_robust_gate_v3
  output_dir: outputs/train/hsi_stage2_transl_robust_gate_v3/stage2a_gt_transl
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: Training
  sequence_length: 2
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  num_workers: 16
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  enable_hsi_human_scene_align: true
  enable_hsi_contact_refine: false
  smpl_provider: gt_perturbed
  nlf_use_detector: false
  nlf_require_boxes: true
  nlf_model_name: smpl
  nlf_internal_batch_size: 192
  nlf_num_aug: 1
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_aggregator_forward: true
  freeze_hsi_scene_affine: true
  freeze_hsi_backbone: true
  train_hsi_human_scene_align_only: true
  predict_boxes: false
  predict_id_embed: false
  smpl_return_aux: false
  smpl_query_box_prior: true
  smpl_track_assignment_mode: gt
  smpl_use_external_track_prior: false
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_probe_mode: local_nearest
  hsi_affine_probe_mode: local_nearest
  hsi_probe_window: 9
  hsi_scene_affine_mode: clip_median
  hsi_enable_temporal_momentum: false
  hsi_align_feature_version: robust_basis_v2
  hsi_align_hidden_dim: 256
  hsi_align_num_sample_vertices: 128
  hsi_align_local_window: 7
  hsi_align_max_ray_delta_m: 3.0
  hsi_align_max_tangent_delta_m: 0.12
  hsi_align_use_delta_gate: true
  hsi_align_overwrite_refined: true
  hsi_align_base_source: pred
  hsi_align_max_correspondence_distance_m: 0.75
  hsi_align_gt_max_correspondence_distance_m: 3.5
  hsi_align_min_depth_confidence: 0.0
  hsi_align_residual_mad_multiplier: 3.0
  hsi_align_max_depth_m: 20.0
  hsi_geometry_mode: gt_metric

checkpoint:
  resume: outputs/train/stage1_scale_linear_b20_gpu7/checkpoint_top_train_epoch_0003_loss_total_0.171740.pt
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false
  reset_epoch: true
  save_scope: hsi
  save_prefixes:
    - hsi_refinement_head.
    - hsi_human_scene_align_head.
  save_optimizer: false
  save_epoch_checkpoint: false
  save_latest: true
  save_final: false
  save_top_k: 3
  save_top_k_from_train: false
  topk_create_stable_copies: true
  monitor: metric_stage2_selection
  monitor_mode: min

optim:
  batch_size: 24
  epochs: 3
  lr: 0.00002
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 20
  log_style: progress
  progress_bar_width: 28
  progress_max_loss_items: 12
  progress_log_keys: loss_total,metric_stage2_selection,metric_hsi_transl_noisy_l2_median,metric_hsi_transl_noisy_improvement_rate,metric_hsi_transl_clean_displacement_mean_m,metric_hsi_transl_clean_gate_mean,metric_hsi_transl_noisy_gate_mean,metric_hsi_ray_delta_l1_delta,metric_hsi_tangent_delta_l1_delta,metric_hsi_align_valid_ratio
  val_interval: 1

training_prior:
  center_noise: 0.0
  size_noise: 0.0
  drop_prob: 0.0
  smpl_perturb_mode: translation
  smpl_transl_ray_noise_schedule: 0.05,0.10,0.15
  smpl_transl_tangent_noise_schedule_m: 0.02,0.05,0.08
  smpl_transl_ray_noise_clean_prob: 0.20
  smpl_transl_ray_noise_mode: uniform
  smpl_gt_override_prob: 0.0

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  conf_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  use_vggt_camera_projection: true
  projection_camera_source: gt
  hsi_pose_weight: 0.0
  hsi_betas_weight: 0.0
  hsi_transl_cam_weight: 8.0
  hsi_ray_delta_weight: 4.0
  hsi_tangent_delta_weight: 4.0
  hsi_joints3d_weight: 1.0
  hsi_vertices_weight: 0.0
  hsi_projected_joints2d_weight: 0.0
  hsi_align_point_weight: 0.25
  hsi_align_delta_reg_weight: 0.02
  hsi_align_no_worse_weight: 2.0
  hsi_transl_clean_identity_weight: 20.0
  hsi_transl_noise_gate_weight: 2.0
  hsi_transl_gate_full_open_m: 0.10
  hsi_transl_gate_target_mode: magnitude_v2
  hsi_delta_reg_weight: 0.0
  hsi_no_worse_weight: 2.0
  hsi_no_worse_margin_m: 0.002
  hsi_depth_teacher_weight: 0.0
  hsi_smpl_scale_teacher_weight: 0.0
  hsi_contact_weight: 0.0
  id_weight: 0.0

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
