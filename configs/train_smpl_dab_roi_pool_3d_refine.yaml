experiment:
  name: smpl_dab_roi_pool_3d_refine_20q
  output_dir: outputs/train/smpl_dab_roi_pool_3d_refine_20q
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: ""
  sequence_length: 2
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: false
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: false
  enable_alignment: false
  enable_smpl: true
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_aggregator_forward: false
  train_smpl_query_token: true
  train_smpl_box_prior_embed: true
  train_smpl_patch_pool_embed: true
  predict_boxes: true
  smpl_bbox_mode: reference_residual
  predict_id_embed: false
  smpl_return_aux: true
  smpl_query_box_prior: true
  smpl_query_patch_pool: true
  smpl_query_patch_pool_expand: 0.12
  id_embed_dim: 256

checkpoint:
  resume: outputs/train/smpl_dab_joint_refine_20q/checkpoint_latest.pt
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false

optim:
  batch_size: 1
  epochs: 100
  lr: 0.00001
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 10
  save_interval: 1
  val_interval: 1

training_prior:
  center_noise: 0.04
  size_noise: 0.10
  drop_prob: 0.03

loss:
  type: hungarian
  pose_weight: 6.0
  betas_weight: 0.8
  transl_cam_weight: 2.0
  joints3d_weight: 12.0
  projected_joints2d_weight: 0.25
  conf_weight: 0.35
  conf_loss_type: focal
  conf_focal_alpha: 0.25
  conf_focal_gamma: 2.0
  conf_target_type: matched_iou
  conf_iou_min: 0.3
  conf_iou_power: 1.0
  duplicate_conf_weight: 0.10
  duplicate_iou_threshold: 0.5
  aux_weight: 0.05
  aux_conf_weight: 0.2
  aux_bbox_weight: 0.5
  aux_giou_weight: 0.25
  bbox_weight: 0.5
  giou_weight: 0.25
  projected_bbox_weight: 0.05
  projected_giou_weight: 0.05
  projected_bbox_source: joints
  use_vggt_camera_projection: true
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
