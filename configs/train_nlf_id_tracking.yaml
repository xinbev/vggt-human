experiment:
  name: nlf_id_tracking_gpu5
  output_dir: outputs/train/nlf_id_tracking_gpu5
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: ""
  sequence_length: 4
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: false
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: false
  enable_alignment: false
  enable_smpl: true
  smpl_provider: nlf
  nlf_use_detector: false
  nlf_require_boxes: true
  nlf_model_name: smpl
  nlf_internal_batch_size: 64
  nlf_num_aug: 1
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_aggregator_forward: true
  train_smpl_query_token: false
  predict_boxes: false
  predict_id_embed: true
  id_embed_dim: 256
  id_hidden_dim: 512
  smpl_track_assignment_mode: gt
  smpl_track_assign_id_weight: 0.35
  smpl_track_assign_max_id_distance: 0.70

checkpoint:
  resume: ""
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false
  save_scope: trainable
  save_optimizer: false
  save_epoch_checkpoint: true
  save_latest: true
  save_final: true
  save_top_k: 3
  save_top_k_from_train: true
  topk_create_stable_copies: false
  monitor: loss_id
  monitor_mode: min

optim:
  batch_size: 1
  epochs: 20
  lr: 0.0001
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 20
  log_style: progress
  progress_bar_width: 28
  progress_max_loss_items: 6
  progress_log_keys:
    - loss_total
    - loss_id
  allowed_trainable_prefixes:
    - nlf_id_head.
  required_trainable_prefixes:
    - nlf_id_head.
  required_gradient_prefixes:
    - nlf_id_head.
  save_interval: 1
  val_interval: 1

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  conf_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  id_weight: 1.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
