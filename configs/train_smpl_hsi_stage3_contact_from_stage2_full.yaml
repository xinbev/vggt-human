experiment:
  name: hsi_stage3_contact_from_stage2_full
  output_dir: outputs/train/hsi_stage3_contact_from_stage2_full
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: Training
  train_sequence_manifest: ""
  val_sequence_manifest: ""
  contact_teacher_root: ""
  require_contact_teacher: true
  sequence_length: 2
  stride: 1
  image_size: 518
  image_resolution: 512
  resize_mode: balanced
  max_humans: 20
  boxes_root_key: datasets.bedlam_boxes_root
  require_boxes: true
  require_smpl: true
  require_depth: true
  num_workers: 12
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  enable_hsi_human_scene_align: true
  enable_hsi_translation_refine_v4: false
  enable_hsi_contact_refine: true
  smpl_provider: nlf
  nlf_use_detector: false
  nlf_require_boxes: true
  nlf_model_name: smpl
  nlf_internal_batch_size: 128
  nlf_num_aug: 1
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_aggregator_forward: true
  freeze_hsi_backbone: true
  freeze_hsi_scene_affine: true
  freeze_hsi_betas_delta: true
  freeze_hsi_human_scene_align: true
  train_hsi_contact_refine_only: true
  freeze_hsi_contact_refine: false
  freeze_hsi_contact_pose_branch: true
  freeze_hsi_contact_root_branch: false
  train_hsi_last_blocks: 0
  predict_boxes: false
  predict_id_embed: false
  smpl_return_aux: false
  smpl_query_box_prior: true
  smpl_track_assignment_mode: gt
  smpl_use_external_track_prior: false
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_probe_mode: local_nearest
  hsi_affine_probe_mode: local_nearest
  hsi_probe_window: 9
  hsi_scene_affine_mode: clip_median
  hsi_scene_log_scale_min: -5.0
  hsi_scene_log_scale_max: 5.0
  hsi_transl_delta_scale: 0.05
  hsi_transl_delta_mode: xyz
  hsi_use_affine_depth_for_transl: true
  hsi_affine_depth_detach: true
  hsi_align_hidden_dim: 256
  hsi_align_num_sample_vertices: 96
  hsi_align_local_window: 7
  hsi_align_max_ray_delta_m: 0.25
  hsi_align_max_tangent_delta_m: 0.08
  hsi_align_use_delta_gate: true
  hsi_align_overwrite_refined: true
  hsi_enable_temporal_momentum: false
  hsi_temporal_momentum_use_track_ids: true
  id_embed_dim: 256
  hsi_contact_hidden_dim: 256
  hsi_contact_sole_vertices_per_foot: 48
  hsi_contact_support_window: 21
  hsi_contact_support_min_points: 24
  hsi_contact_support_max_rmse_m: 0.05
  hsi_contact_support_max_depth_m: 20.0
  hsi_contact_max_root_normal_delta_m: 0.12
  hsi_contact_max_hip_delta_deg: 4.0
  hsi_contact_max_knee_delta_deg: 8.0
  hsi_contact_max_ankle_delta_deg: 10.0
  hsi_contact_overwrite_refined: true

checkpoint:
  resume: outputs/train/smpl_hsi_nlf_stage2_human_scene_align_full/checkpoint_latest.pt
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false
  resume_required_prefixes:
    - hsi_refinement_head.
    - hsi_human_scene_align_head.
  reset_epoch: true
  save_scope: hsi
  save_prefixes:
    - hsi_refinement_head.
    - hsi_human_scene_align_head.
    - hsi_contact_refine_head.
  save_optimizer: false
  save_epoch_checkpoint: false
  save_latest: true
  save_final: false
  save_top_k: 3
  save_top_k_from_train: false
  topk_create_stable_copies: true
  monitor: metric_stage3_selection
  monitor_mode: min
  frozen_hash_prefixes:
    - hsi_refinement_head.
    - hsi_human_scene_align_head.

optim:
  batch_size: 16
  epochs: 3
  lr: 0.000002
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 20
  log_style: progress
  progress_bar_width: 28
  progress_max_loss_items: 12
  progress_log_keys:
    - loss_total
    - loss_hsi_contact_refine_plane
    - loss_hsi_contact_refine_class
    - loss_hsi_contact_refine_no_worse
    - loss_hsi_contact_refine_swing_no_pull
    - metric_hsi_contact_float_p95_m
    - metric_hsi_contact_penetration_p95_m
    - metric_hsi_contact_false_pull_rate
    - metric_hsi_contact_contact_gate_mean
    - metric_hsi_contact_swing_gate_mean
    - metric_hsi_transl_l1_delta
    - metric_hsi_joint_error_delta
  val_interval: 1
  allowed_trainable_prefixes:
    - hsi_contact_refine_head.
  required_trainable_prefixes:
    - hsi_contact_refine_head.
  required_gradient_prefixes:
    - hsi_contact_refine_head.

training_prior:
  center_noise: 0.0
  size_noise: 0.0
  drop_prob: 0.0
  smpl_transl_ray_noise_schedule: 0.0
  smpl_transl_ray_noise_clean_prob: 0.0
  smpl_transl_ray_noise_mode: uniform
  smpl_gt_override_prob: 0.0

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  conf_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  projected_bbox_source: joints
  use_vggt_camera_projection: true
  hsi_pose_weight: 0.0
  hsi_betas_weight: 0.0
  hsi_transl_cam_weight: 0.0
  hsi_joints3d_weight: 0.0
  hsi_vertices_weight: 0.0
  hsi_projected_joints2d_weight: 0.0
  hsi_align_point_weight: 0.0
  hsi_align_delta_reg_weight: 0.0
  hsi_align_no_worse_weight: 0.0
  hsi_delta_reg_weight: 0.0
  hsi_no_worse_weight: 0.0
  hsi_depth_teacher_weight: 0.0
  hsi_smpl_scale_teacher_weight: 0.0
  hsi_anchor_depth_weight: 0.0
  hsi_anchor_scene_xyz_weight: 0.0
  hsi_contact_weight: 0.0
  hsi_foot_contact_weight: 0.0
  hsi_foot_sole_contact_weight: 0.0
  hsi_support_plane_contact_weight: 0.0
  hsi_contact_refine_plane_weight: 4.0
  hsi_contact_refine_pose_weight: 0.0
  hsi_contact_refine_class_weight: 0.5
  hsi_contact_refine_no_worse_weight: 2.0
  hsi_contact_refine_swing_no_pull_weight: 2.0
  hsi_foot_float_margin_m: 0.05
  hsi_foot_penetration_margin_m: 0.02
  hsi_foot_sole_float_margin_m: 0.04
  hsi_foot_sole_penetration_margin_m: 0.015
  hsi_support_plane_float_margin_m: 0.04
  hsi_support_plane_penetration_margin_m: 0.015
  hsi_pose_velocity_weight: 0.0
  hsi_betas_velocity_weight: 0.0
  hsi_transl_velocity_weight: 0.0
  hsi_joints_velocity_weight: 0.0
  hsi_joints_acceleration_weight: 0.0
  hsi_temporal_no_worse_weight: 0.0
  hsi_foot_sliding_weight: 0.0
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
