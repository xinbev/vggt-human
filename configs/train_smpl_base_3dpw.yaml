experiment:
  name: smpl_base_3dpw
  output_dir: outputs/train/smpl_base_3dpw
  seed: 42

data:
  dataset: 3dpw
  root_key: datasets.threedpw_root
  annotation_root_key: datasets.threedpw_smpl_base_root
  train_split: train
  val_split: validation
  sequence_length: 1
  stride: 1
  image_size: 518
  max_humans: 2
  require_boxes: true
  require_smpl: true
  require_depth: false
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: false
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: false
  num_smpl_queries: 2
  freeze_aggregator: true
  freeze_camera_head: true
  freeze_aggregator_forward: false
  train_smpl_query_token: true
  predict_boxes: true
  smpl_bbox_mode: direct
  predict_id_embed: false
  smpl_return_aux: true
  smpl_query_box_prior: true
  smpl_query_patch_pool: false
  smpl_track_assignment_mode: none
  smpl_enable_translation_refine: false
  smpl_enable_temporal_translation: false
  smpl_enable_post_track_temporal_translation: false
  id_embed_dim: 256

checkpoint:
  resume: ""
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false
  save_epoch_checkpoint: false
  save_latest: true
  save_final: true
  save_top_k: 3
  monitor: loss_total
  monitor_mode: min

optim:
  batch_size: 1
  epochs: 5
  lr: 0.00002
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 20
  save_interval: 0
  val_interval: 1
  log_style: progress

training_prior:
  center_noise: 0.02
  size_noise: 0.05
  drop_prob: 0.00

loss:
  type: hungarian
  pose_weight: 1.0
  betas_weight: 0.1
  transl_cam_weight: 0.1
  conf_weight: 1.0
  conf_loss_type: focal
  conf_focal_alpha: 0.25
  conf_focal_gamma: 2.0
  conf_target_type: matched_iou
  conf_iou_min: 0.3
  conf_iou_power: 1.0
  duplicate_conf_weight: 0.5
  duplicate_iou_threshold: 0.5
  aux_weight: 0.3
  aux_conf_weight: 1.0
  aux_bbox_weight: 5.0
  aux_giou_weight: 2.0
  bbox_weight: 5.0
  giou_weight: 2.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  use_vggt_camera_projection: false
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 5.0
  cost_giou: 2.0
  cost_kpts: 0.0
