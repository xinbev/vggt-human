experiment:
  name: smpl_query_bedlam
  output_dir: outputs/train/smpl_query_bedlam
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: Test
  sequence_length: 2
  stride: 1
  image_size: 518
  max_humans: 10
  require_smpl: true
  require_depth: false
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: false
  enable_depth: false
  enable_alignment: false
  enable_smpl: true
  num_smpl_queries: 10

checkpoint:
  resume: ""
  load_vggt_baseline: true
  strict: false

optim:
  batch_size: 1
  epochs: 10
  lr: 0.0001
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_interval: 10
  save_interval: 1
  val_interval: 1

loss:
  pose_weight: 1.0
  betas_weight: 0.1
  cam_weight: 0.1
  conf_weight: 1.0
  depth_weight: 0.0
