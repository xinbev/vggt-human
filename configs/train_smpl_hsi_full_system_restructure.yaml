experiment:
  name: smpl_hsi_full_system_restructure
  output_dir: outputs/train/smpl_hsi_full_system_restructure
  seed: 42

data:
  dataset: bedlam
  root_key: datasets.bedlam_root
  train_split: Training
  val_split: ""
  sequence_length: 12
  stride: 1
  image_size: 518
  max_humans: 20
  boxes_root_key: datasets.bedlam_tracks_root
  require_boxes: true
  query_source: detections
  mask_patch_threshold: 0.10
  min_mask_patches: 4
  require_smpl: true
  require_depth: true
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  embed_dim: 1024
  enable_camera: true
  enable_depth: true
  enable_alignment: false
  enable_smpl: true
  enable_hsi_refine: true
  num_smpl_queries: 20
  freeze_aggregator: true
  freeze_aggregator_forward: true
  freeze_camera_head: true
  freeze_dense_head: true
  freeze_smpl_head: true
  predict_boxes: true
  smpl_bbox_mode: reference_residual
  predict_id_embed: false
  smpl_return_aux: true
  smpl_query_box_prior: true
  smpl_query_patch_pool: true
  smpl_query_patch_pool_expand: 0.12
  smpl_query_patch_pool_mode: mask_intersection
  smpl_query_mask_min_patch_count: 4
  smpl_query_mask_fallback_to_box: true
  smpl_enable_translation_refine: true
  smpl_translation_refine_hidden_dim: 512
  smpl_translation_refine_max_ray_delta_m: 1.20
  smpl_translation_refine_max_tangent_delta_m: 0.60
  smpl_translation_refine_max_log_depth_delta: 0.85
  smpl_translation_refine_max_box_prior_weight: 1.00
  smpl_translation_refine_human_height_prior_m: 1.70
  smpl_translation_refine_use_log_depth: true
  smpl_enable_temporal_translation: false
  smpl_enable_post_track_temporal_translation: true
  smpl_track_assignment_mode: base_smpl
  smpl_use_external_track_prior: true
  smpl_track_assign_max_age: 90
  smpl_track_assign_min_quality: 0.25
  smpl_track_assign_max_center_distance_norm: 0.25
  smpl_track_assign_max_transl_distance_m: 1.50
  smpl_track_assign_max_beta_l1: 0.30
  smpl_track_assign_external_iou_min: 0.50
  hsi_hidden_dim: 512
  hsi_num_layers: 5
  hsi_num_heads: 8
  hsi_num_iters: 3
  hsi_scene_window: 3
  hsi_probe_mode: projected
  hsi_affine_probe_mode: projected
  hsi_probe_window: 9
  hsi_probe_blend: 1.0
  hsi_use_delta_gate: true
  hsi_enable_temporal_momentum: true
  hsi_temporal_momentum_decay: 0.7
  hsi_temporal_momentum_detach: true
  hsi_temporal_momentum_use_track_ids: true
  hsi_track_quality_min: 0.25
  hsi_track_gap_max: 30
  hsi_scene_affine_mode: clip_median
  hsi_scene_affine_ema_alpha: 0.25
  id_embed_dim: 256

checkpoint:
  resume: outputs/train/smpl_hsi_after_translation_ray_refine/checkpoint_latest.pt
  load_vggt_baseline: true
  strict: false
  resume_strict: false
  resume_optimizer: false
  save_final: true
  save_epoch_checkpoint: false
  save_latest: true

optim:
  batch_size: 1
  epochs: 1
  lr: 0.000001
  weight_decay: 0.05
  grad_clip_norm: 0.25
  log_interval: 20
  save_interval: 0
  val_interval: 1
  log_style: progress

training_prior:
  center_noise: 0.04
  size_noise: 0.10
  drop_prob: 0.03

loss:
  type: hungarian
  pose_weight: 0.0
  betas_weight: 0.0
  transl_cam_weight: 0.0
  joints3d_weight: 0.0
  projected_joints2d_weight: 0.0
  conf_weight: 0.0
  aux_weight: 0.0
  bbox_weight: 0.0
  giou_weight: 0.0
  projected_bbox_weight: 0.0
  projected_giou_weight: 0.0
  projected_bbox_source: joints
  use_vggt_camera_projection: true
  hsi_pose_weight: 2.0
  hsi_betas_weight: 0.4
  hsi_transl_cam_weight: 2.0
  hsi_joints3d_weight: 12.0
  hsi_vertices_weight: 4.0
  hsi_projected_joints2d_weight: 0.20
  hsi_depth_teacher_weight: 0.10
  hsi_anchor_depth_weight: 0.05
  hsi_delta_reg_weight: 0.50
  hsi_no_worse_weight: 1.0
  hsi_no_worse_margin_m: 0.02
  hsi_gate_reg_weight: 0.01
  id_weight: 0.0
  id_temperature: 0.07

matching:
  enabled: true
  cost_conf: 0.5
  cost_bbox: 8.0
  cost_giou: 4.0
  cost_kpts: 0.0
